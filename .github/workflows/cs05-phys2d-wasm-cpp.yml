name: cs05-phys2d-wasm-cpp

on:
  push:
    paths: ['cs05-phys2d-wasm-cpp/**', '_shared/**', '.github/workflows/cs05-phys2d-wasm-cpp.yml']
  pull_request:
    paths: ['cs05-phys2d-wasm-cpp/**', '_shared/**', '.github/workflows/cs05-phys2d-wasm-cpp.yml']

defaults:
  run:
    working-directory: cs05-phys2d-wasm-cpp

jobs:
  native:
    name: 5-gate (C++ native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck cmake build-essential
      - name: Gate 1/5 — clang-format
        run: |
          find core -name "*.cpp" -o -name "*.hpp" \
            | xargs clang-format --dry-run --Werror -style=file
      - name: Configure (export compile_commands)
        run: cmake -B build -S core -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Gate 2/5 — clang-tidy + cppcheck
        run: |
          find core/src -name "*.cpp" | xargs clang-tidy -p build --warnings-as-errors='*'
          cppcheck --enable=warning,style,performance --error-exitcode=1 --quiet \
            -I core/include core/src
      - name: Gate 3/5 — build
        run: cmake --build build --parallel
      - name: Gate 4/5 — ctest
        run: ctest --test-dir build --output-on-failure --parallel
      - name: Gate 5/5 — doc-coverage
        run: bash ../_shared/doc-coverage.sh

  wasm-build:
    name: wasm build smoke
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
      - name: Configure emcmake
        run: emcmake cmake -B build-wasm -S cs05-phys2d-wasm-cpp/core -DCMAKE_BUILD_TYPE=Release
        working-directory: ./
      - name: Build wasm
        run: emmake make -C build-wasm -j
        working-directory: ./
      - name: Verify wasm artifact
        run: |
          test -f build-wasm/phys2d.wasm
          test -f build-wasm/phys2d.js
          ls -l build-wasm/phys2d.*
        working-directory: ./
